spring.application.name=DailyMotionMiner
server.port=8081
DailyMotionMiner.baseUri=https://api.dailymotion.com
DailyMotionMiner.videoFields=?fields=id,title,description,created_time,channel,tags,owner.id,owner.username,owner.url,owner.avatar_720_url
videominer.base.url=${VIDEOMINER_URL:http://localhost:8080}
DailyMotionMiner.channelFields=?fields=id,name,description,created_time
DailyMotionMiner.userFields=?fields=owner.id,owner.username,owner.url,owner.avatar_720_url
DailyMotionMiner.subtitleFields=?fields=id,url,language

videominer.api.key=123456789

#springdoc.api-docs.enabled=false
#springdoc.swagger-ui.enabled=false